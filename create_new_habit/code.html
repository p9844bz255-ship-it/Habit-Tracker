<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Elements
        const trigger = document.getElementById('date-picker-trigger');
        const backdrop = document.getElementById('datepicker-backdrop');
        const sheet = document.getElementById('datepicker-sheet');
        const closeBtn = document.getElementById('close-datepicker');
        const applyBtn = document.getElementById('apply-date');
        const dateInput = document.getElementById('date-input');
        
        const monthSelect = document.getElementById('month-select');
        const yearSelect = document.getElementById('year-select');
        const calendarDays = document.getElementById('calendar-days');
        const prevMonthBtn = document.getElementById('prev-month');
        const nextMonthBtn = document.getElementById('next-month');

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        // System Data
        let today = new Date();
        let currentMonth = today.getMonth(); // 0-11
        let currentYear = today.getFullYear();
        
        // Selected Data (Defaults to today)
        let selectedDay = today.getDate();
        let selectedMonth = today.getMonth();
        let selectedYear = today.getFullYear();

        // 1. Populate Dropdowns
        months.forEach((month, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = month;
            monthSelect.appendChild(option);
        });

        const startYear = today.getFullYear() - 5;
        const endYear = today.getFullYear() + 5;
        for (let y = startYear; y <= endYear; y++) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            yearSelect.appendChild(option);
        }

        // 2. Render Calendar Function
        function renderCalendar() {
            monthSelect.value = currentMonth;
            yearSelect.value = currentYear;
            calendarDays.innerHTML = ''; // Clear previous

            const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Create blank spaces for days before the 1st
            for (let i = 0; i < firstDayOfMonth; i++) {
                const blank = document.createElement('div');
                calendarDays.appendChild(blank);
            }

            // Create actual day buttons
            for (let i = 1; i <= daysInMonth; i++) {
                const dayBtn = document.createElement('button');
                dayBtn.textContent = i;
                
                // Base styling
                dayBtn.className = "w-8 h-8 rounded-full flex items-center justify-center mx-auto hover:bg-surface-container-high transition-all text-on-background";

                // Highlight Selected Date
                if (i === selectedDay && currentMonth === selectedMonth && currentYear === selectedYear) {
                    dayBtn.className = "w-8 h-8 rounded-full bg-primary-container text-white font-semibold scale-110 flex items-center justify-center mx-auto shadow-sm";
                } 
                // Mark Today's Date (if not selected)
                else if (i === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
                    dayBtn.className = "w-8 h-8 rounded-full border border-primary text-primary font-semibold flex items-center justify-center mx-auto";
                }

                // Click event to select a date
                dayBtn.addEventListener('click', () => {
                    selectedDay = i;
                    selectedMonth = currentMonth;
                    selectedYear = currentYear;
                    renderCalendar(); // Refresh UI to move the highlight
                });

                calendarDays.appendChild(dayBtn);
            }
        }

        // 3. Navigation Controls
        prevMonthBtn.addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        });

        nextMonthBtn.addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        });

        monthSelect.addEventListener('change', (e) => {
            currentMonth = parseInt(e.target.value);
            renderCalendar();
        });

        yearSelect.addEventListener('change', (e) => {
            currentYear = parseInt(e.target.value);
            renderCalendar();
        });

        // 4. Modal Open/Close Logic
        function openDatePicker() {
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
            // Reset view to currently selected date when opening
            currentMonth = selectedMonth;
            currentYear = selectedYear;
            renderCalendar();
        }

        function closeDatePicker() {
            backdrop.classList.add('opacity-0');
            sheet.classList.add('translate-y-full');
            setTimeout(() => { backdrop.classList.add('hidden'); }, 300);
        }

        trigger.addEventListener('click', openDatePicker);
        closeBtn.addEventListener('click', closeDatePicker);
        backdrop.addEventListener('click', closeDatePicker);

        // 5. Apply Button Logic
        applyBtn.addEventListener('click', () => {
            // Format format to: Month DD, YYYY (e.g. May 21, 2026)
            dateInput.value = `${months[selectedMonth]} ${selectedDay}, ${selectedYear}`;
            closeDatePicker();
        });

        // Initialize calendar on load
        renderCalendar();
    });
</script>
