<script>
    document.addEventListener("DOMContentLoaded", () => {
        const trigger = document.getElementById('date-picker-trigger');
        const backdrop = document.getElementById('datepicker-backdrop');
        const sheet = document.getElementById('datepicker-sheet');
        const closeBtn = document.getElementById('close-datepicker');
        const applyBtn = document.getElementById('apply-date');
        const dateInput = document.getElementById('date-input');

        function openDatePicker() {
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        function closeDatePicker() {
            backdrop.classList.add('opacity-0');
            sheet.classList.add('translate-y-full');
            setTimeout(() => {
                backdrop.classList.add('hidden');
            }, 300);
        }

        trigger.addEventListener('click', openDatePicker);
        closeBtn.addEventListener('click', closeDatePicker);
        backdrop.addEventListener('click', closeDatePicker);

        // Dummy interactive selection filling
        applyBtn.addEventListener('click', () => {
            dateInput.value = "May 10, 2026";
            closeDatePicker();
        });
    });
</script>
